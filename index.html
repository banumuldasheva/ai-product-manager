<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>∞</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; cursor: none; }
    canvas { display: block; }
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font: 11px/1 'SF Mono', monospace;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.18);
      pointer-events: none;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">click · palette &nbsp;|&nbsp; move · attract</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H;
const N = 5000;          // particle count
const particles = [];
let   t = 0;             // global time (seconds)
let   paletteIdx = 0;
let   mouse = { x: 0, y: 0, down: false };

// ── Colour palettes ────────────────────────────────────────────────────────
const PALETTES = [
  // neon aurora
  (hOff) => (base) => `hsl(${(base + hOff) % 360}, 90%, 65%)`,
  // fire → violet
  (hOff) => (base) => `hsl(${(base * 0.4 + hOff) % 360}, 100%, 60%)`,
  // deep ocean
  (hOff) => (base) => `hsl(${(180 + base * 0.5 + hOff) % 360}, 80%, 55%)`,
  // pastel dream
  (hOff) => (base) => `hsl(${(base + hOff) % 360}, 60%, 75%)`,
  // monochrome glitch
  (hOff) => (base) => `hsl(${(280 + Math.sin(base * 0.05) * 40) % 360}, 70%, 60%)`,
];

// ── Flow field ─────────────────────────────────────────────────────────────
// Layered sin/cos to produce a pseudo-Perlin field
function flowAngle(x, y, t) {
  const s = 0.0025;
  const a = Math.sin(x * s       + t * 0.4)  * Math.cos(y * s * 1.4 + t * 0.3);
  const b = Math.sin((x - y) * s * 0.8 + t * 0.6);
  const c = Math.cos(x * s * 1.9 - y * s     + t * 0.5);
  const d = Math.sin(x * s * 0.5 + y * s * 1.1 - t * 0.2);
  return (a + b + c + d) * Math.PI;
}

// ── Particle ───────────────────────────────────────────────────────────────
class Particle {
  constructor() { this.spawn(); }

  spawn() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.px = this.x;
    this.py = this.y;
    this.age    = 0;
    this.life   = 80 + Math.random() * 220;
    this.speed  = 1.2 + Math.random() * 2.2;
    this.hBase  = Math.random() * 360;
  }

  step() {
    this.px = this.x;
    this.py = this.y;

    // flow field
    const angle = flowAngle(this.x, this.y, t);
    let vx = Math.cos(angle) * this.speed;
    let vy = Math.sin(angle) * this.speed;

    // mouse attraction
    const dx = mouse.x - this.x;
    const dy = mouse.y - this.y;
    const dist2 = dx * dx + dy * dy;
    if (dist2 < 200 * 200) {
      const f = mouse.down ? 6 : 2.5;
      const inv = f / Math.sqrt(dist2 + 1);
      vx += dx * inv * 0.012;
      vy += dy * inv * 0.012;
    }

    this.x += vx;
    this.y += vy;
    this.age++;

    if (this.age > this.life || this.x < 0 || this.x > W || this.y < 0 || this.y > H) {
      this.spawn();
      return;
    }

    // colour
    const fade   = Math.min(1, (this.life - this.age) / 40);
    const hue    = (this.hBase + angle * 57.3 + t * 25) % 360;
    const colour = PALETTES[paletteIdx](t * 40)(hue);

    ctx.beginPath();
    ctx.moveTo(this.px, this.py);
    ctx.lineTo(this.x,  this.y);
    ctx.strokeStyle = colour.replace('hsl', 'hsla').replace(')', `, ${fade * 0.75})`);
    ctx.lineWidth   = 1;
    ctx.stroke();
  }
}

// ── Fractal overlay (Lissajous spirograph rings) ───────────────────────────
function drawSpirograph() {
  ctx.save();
  ctx.translate(W / 2, H / 2);

  for (let layer = 0; layer < 6; layer++) {
    const r      = Math.min(W, H) * (0.12 + layer * 0.1);
    const p      = 2 + layer;
    const q      = 3 + layer;
    const phase  = t * (0.07 + layer * 0.03);
    const steps  = 600 + layer * 200;
    const hue    = (t * 18 + layer * 55) % 360;

    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const u = (i / steps) * Math.PI * 2 * q;
      const x = r * Math.sin(p * u + phase);
      const y = r * Math.cos(q * u + phase * 1.3);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `hsla(${hue}, 75%, 65%, 0.035)`;
    ctx.lineWidth   = 1.2;
    ctx.stroke();
  }

  ctx.restore();
}

// ── Recursive fractal star (depth 5) ──────────────────────────────────────
function fractalBranch(x, y, len, angle, depth) {
  if (depth === 0 || len < 1.5) return;
  const x2 = x + Math.cos(angle) * len;
  const y2 = y + Math.sin(angle) * len;
  const hue = (t * 22 + depth * 40 + len) % 360;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = `hsla(${hue}, 85%, 65%, ${depth * 0.04})`;
  ctx.lineWidth   = depth * 0.5;
  ctx.stroke();
  const spread = 0.55 + Math.sin(t * 0.3) * 0.15;
  fractalBranch(x2, y2, len * 0.67, angle - spread, depth - 1);
  fractalBranch(x2, y2, len * 0.67, angle + spread, depth - 1);
}

function drawFractalTree() {
  const cx = W / 2, cy = H / 2;
  const len = Math.min(W, H) * 0.11;
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 + t * 0.04;
    fractalBranch(cx, cy, len, a, 5);
  }
}

// ── Cursor glow ────────────────────────────────────────────────────────────
function drawCursor() {
  const hue = (t * 60) % 360;
  const r   = mouse.down ? 22 : 14;
  const g   = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, r * 3);
  g.addColorStop(0,   `hsla(${hue}, 100%, 80%, 0.9)`);
  g.addColorStop(0.3, `hsla(${hue}, 100%, 65%, 0.4)`);
  g.addColorStop(1,   `hsla(${hue}, 100%, 65%, 0)`);
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, r * 3, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
}

// ── Init ───────────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  mouse.x = W / 2;
  mouse.y = H / 2;
}

function init() {
  resize();
  particles.length = 0;
  for (let i = 0; i < N; i++) particles.push(new Particle());
}

// ── Loop ───────────────────────────────────────────────────────────────────
let last = 0;
function loop(ts) {
  t = ts * 0.001;

  // Trailing fade (lower = longer trails)
  ctx.fillStyle = 'rgba(0,0,0,0.13)';
  ctx.fillRect(0, 0, W, H);

  drawSpirograph();
  drawFractalTree();

  particles.forEach(p => p.step());
  drawCursor();

  requestAnimationFrame(loop);
}

// ── Events ─────────────────────────────────────────────────────────────────
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', e => { mouse.down = true; mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mouseup',   () => { mouse.down = false; });
window.addEventListener('click',     () => { paletteIdx = (paletteIdx + 1) % PALETTES.length; });
window.addEventListener('resize',    resize);

// Touch
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: false });
window.addEventListener('touchstart', e => {
  mouse.down = true;
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  paletteIdx = (paletteIdx + 1) % PALETTES.length;
});
window.addEventListener('touchend', () => { mouse.down = false; });

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
