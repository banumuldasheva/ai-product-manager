<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Product Manager</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050a14;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #e0f0ff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    #root {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
    }

    .scene {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Center Brain ── */
    .brain {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
    }

    .brain-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(100, 200, 255, 0.15);
      animation: ripple 3s ease-out infinite;
    }
    .brain-ring:nth-child(1) { width: 160px; height: 160px; animation-delay: 0s; }
    .brain-ring:nth-child(2) { width: 220px; height: 220px; animation-delay: 0.8s; }
    .brain-ring:nth-child(3) { width: 290px; height: 290px; animation-delay: 1.6s; }

    @keyframes ripple {
      0%   { opacity: 0.6; transform: scale(0.9); }
      100% { opacity: 0; transform: scale(1.15); }
    }

    .brain-core {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #1a6fff, #0a1a3f 70%);
      box-shadow:
        0 0 30px rgba(40, 120, 255, 0.6),
        0 0 80px rgba(40, 120, 255, 0.2),
        inset 0 0 20px rgba(100, 180, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2px;
      animation: pulse-brain 2s ease-in-out infinite;
      cursor: default;
    }

    @keyframes pulse-brain {
      0%, 100% { box-shadow: 0 0 30px rgba(40,120,255,0.6), 0 0 80px rgba(40,120,255,0.2); }
      50%       { box-shadow: 0 0 50px rgba(40,120,255,0.9), 0 0 120px rgba(40,120,255,0.35); }
    }

    .brain-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #80c8ff;
      text-transform: uppercase;
    }

    .brain-sublabel {
      font-size: 9px;
      color: rgba(120, 180, 255, 0.6);
      letter-spacing: 1px;
    }

    .counter {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    /* ── Floating Cards ── */
    .card {
      position: absolute;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.5;
      max-width: 190px;
      backdrop-filter: blur(10px);
      border: 1px solid;
      animation: card-float 4s ease-in-out infinite;
      cursor: default;
      transition: transform 0.3s;
    }
    .card:hover { transform: scale(1.05) translateY(-4px) !important; }

    .card.input {
      background: rgba(10, 30, 60, 0.75);
      border-color: rgba(60, 140, 255, 0.3);
    }
    .card.output {
      background: rgba(5, 30, 20, 0.75);
      border-color: rgba(40, 200, 120, 0.3);
    }
    .card.chaos {
      background: rgba(40, 10, 10, 0.75);
      border-color: rgba(255, 80, 80, 0.3);
    }

    .card-tag {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 700;
    }
    .card.input  .card-tag { color: #4a9fff; }
    .card.output .card-tag { color: #3ddc84; }
    .card.chaos  .card-tag { color: #ff6060; }

    .card-text { color: rgba(220, 235, 255, 0.85); }

    @keyframes card-float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    /* ── Particle stream dots ── */
    .stream-dot {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      pointer-events: none;
    }

    /* ── Thought ticker at bottom ── */
    .ticker {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px 32px;
      background: rgba(5, 12, 28, 0.9);
      border-top: 1px solid rgba(60, 120, 255, 0.2);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 20;
    }

    .ticker-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: #4a9fff;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .ticker-text {
      font-size: 12px;
      color: rgba(200, 220, 255, 0.8);
      animation: fade-slide 0.4s ease;
    }

    @keyframes fade-slide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Top status bar ── */
    .statusbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(5, 12, 28, 0.85);
      border-bottom: 1px solid rgba(60, 120, 255, 0.15);
      z-index: 20;
    }

    .status-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #80c8ff;
      text-transform: uppercase;
    }

    .status-pills {
      display: flex;
      gap: 10px;
    }

    .pill {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
    }
    .pill.green  { background: rgba(40,200,120,0.15); color: #3ddc84; border: 1px solid rgba(40,200,120,0.3); }
    .pill.blue   { background: rgba(40,120,255,0.15); color: #4a9fff; border: 1px solid rgba(40,120,255,0.3); }
    .pill.red    { background: rgba(255,80,80,0.15);  color: #ff8080; border: 1px solid rgba(255,80,80,0.3); }

    /* ── Floating particles ── */
    .particle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      animation: particle-drift linear infinite;
      opacity: 0;
    }

    @keyframes particle-drift {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      10%  { opacity: 0.7; transform: translateY(-20px) scale(1); }
      90%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-120px) scale(0.3); }
    }

    /* ── Decision Flash ── */
    .decision-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 13px;
      font-weight: 700;
      color: #3ddc84;
      letter-spacing: 2px;
      pointer-events: none;
      animation: flash-up 1.5s ease forwards;
      z-index: 30;
      text-shadow: 0 0 20px rgba(61,220,132,0.8);
      white-space: nowrap;
    }

    @keyframes flash-up {
      0%   { opacity: 0; transform: translate(-50%, -40%); }
      20%  { opacity: 1; transform: translate(-50%, -60%); }
      70%  { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -90%); }
    }
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Data ──────────────────────────────────────────────────────────────────────
const INPUTS = [
  { tag: "User Feedback", text: '"The onboarding is confusing. 3 people dropped off at step 2."', x: -42, y: -38 },
  { tag: "Stakeholder", text: '"We need to ship this by end of quarter. No exceptions."', x: -44, y: 10 },
  { tag: "Bug Report", text: 'CRITICAL: Payment flow crashes on iOS 17.4 — 142 affected users.', x: -40, y: 56 },
  { tag: "Market Data", text: 'Competitor launched feature X. 18% user overlap at risk.', x: -20, y: -52 },
];

const OUTPUTS = [
  { tag: "Prioritized", text: "P0: Fix iOS payment bug\nP1: Simplify onboarding\nP2: Competitive response", x: 26, y: -48 },
  { tag: "Sprint Plan", text: "Sprint 24 · 8 stories · 34 pts\nGoal: Stabilize & retain", x: 30, y: 2 },
  { tag: "Decision", text: "Defer roadmap feature X. Stability > growth this sprint.", x: 24, y: 48 },
];

const CHAOS = [
  { tag: "Slack", text: '@pm can we just add a quick button? Takes 5 mins, promise.', x: 46, y: -20 },
  { tag: "Meeting", text: "⚠ 6 meetings today. Deep work: 0 min.", x: 42, y: 34 },
];

const THOUGHTS = [
  "Processing 847 data points from last sprint retrospective...",
  "Balancing technical debt vs. feature velocity. Ratio: 40/60.",
  "User retention dropped 3.2% — tracing to onboarding step 2.",
  "Generating 12 user stories from raw feedback corpus...",
  "Synthesizing stakeholder priorities. Conflicts detected: 3.",
  "Running impact/effort matrix across 34 backlog items...",
  "Decision: ship fast & iterate. Confidence: 87%.",
  "Alert: sprint velocity trending -15%. Flagging to engineering lead.",
  "Pattern detected: churn spike every time we skip UX review.",
  "Drafting product narrative for board deck. ETA: 4 minutes.",
  "Competitor feature X analyzed. Build vs. buy: build wins.",
  "Auto-generating acceptance criteria from Jira epic #4821...",
];

const DECISIONS = [
  "✓ Backlog re-prioritized",
  "✓ Sprint goal locked",
  "✓ Tech debt allocated",
  "✓ Stakeholder aligned",
  "✓ Risk mitigated",
  "✓ User story shipped",
];

const PILLS = [
  { label: "AI Active", cls: "green" },
  { label: "Processing", cls: "blue" },
  { label: "3 Conflicts", cls: "red" },
];

// ── Background neural net canvas ──────────────────────────────────────────────
function NeuralCanvas() {
  const canvasRef = useRef(null);
  const animRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    let W, H, nodes;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      init();
    }

    function init() {
      nodes = Array.from({ length: 55 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
        r: Math.random() * 1.8 + 0.6,
      }));
    }

    function draw(t) {
      ctx.clearRect(0, 0, W, H);

      // move
      nodes.forEach(n => {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > W) n.vx *= -1;
        if (n.y < 0 || n.y > H) n.vy *= -1;
      });

      // edges
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 160) {
            const alpha = (1 - d / 160) * 0.18;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(60,140,255,${alpha})`;
            ctx.lineWidth = 0.7;
            ctx.stroke();
          }
        }
      }

      // dots
      nodes.forEach(n => {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(80,160,255,0.5)";
        ctx.fill();
      });

      animRef.current = requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener("resize", resize);
    animRef.current = requestAnimationFrame(draw);
    return () => {
      cancelAnimationFrame(animRef.current);
      window.removeEventListener("resize", resize);
    };
  }, []);

  return <canvas ref={canvasRef} id="bg" />;
}

// ── Animated connector lines (SVG) ────────────────────────────────────────────
function Connectors({ cards, centerRef }) {
  const svgRef = useRef(null);
  const animRef = useRef(null);
  const [lines, setLines] = useState([]);

  useEffect(() => {
    function update() {
      if (!centerRef.current || !svgRef.current) return;
      const cr = centerRef.current.getBoundingClientRect();
      const cx = cr.left + cr.width / 2;
      const cy = cr.top + cr.height / 2;

      const ls = cards
        .map(c => {
          const el = document.getElementById(`card-${c.id}`);
          if (!el) return null;
          const r = el.getBoundingClientRect();
          return { x1: r.left + r.width / 2, y1: r.top + r.height / 2, x2: cx, y2: cy, type: c.type };
        })
        .filter(Boolean);

      setLines(ls);
      animRef.current = requestAnimationFrame(update);
    }
    animRef.current = requestAnimationFrame(update);
    return () => cancelAnimationFrame(animRef.current);
  }, [cards]);

  return (
    <svg
      ref={svgRef}
      style={{ position: "fixed", inset: 0, width: "100vw", height: "100vh", pointerEvents: "none", zIndex: 5 }}
    >
      <defs>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>
      {lines.map((l, i) => {
        const color = l.type === "input" ? "60,140,255" : l.type === "output" ? "40,200,120" : "255,80,80";
        return (
          <line
            key={i}
            x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2}
            stroke={`rgba(${color},0.25)`}
            strokeWidth="1"
            strokeDasharray="4 6"
            filter="url(#glow)"
          />
        );
      })}
    </svg>
  );
}

// ── Streaming particles along lines ───────────────────────────────────────────
function StreamParticle({ startX, startY, endX, endY, color, delay, duration }) {
  const style = {
    position: "fixed",
    width: 5,
    height: 5,
    borderRadius: "50%",
    background: color,
    boxShadow: `0 0 6px ${color}`,
    pointerEvents: "none",
    zIndex: 8,
    left: startX - 2.5,
    top: startY - 2.5,
    animation: `move-particle ${duration}ms ${delay}ms linear infinite`,
  };

  return <div style={style} />;
}

// ── Decision flash ─────────────────────────────────────────────────────────────
function DecisionFlash({ text, id }) {
  return <div key={id} className="decision-flash">{text}</div>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [thought, setThought] = useState(THOUGHTS[0]);
  const [thoughtKey, setThoughtKey] = useState(0);
  const [decisionCount, setDecisionCount] = useState(0);
  const [flash, setFlash] = useState(null);
  const [flashKey, setFlashKey] = useState(0);
  const centerRef = useRef(null);

  // Cycle thoughts
  useEffect(() => {
    let i = 0;
    const id = setInterval(() => {
      i = (i + 1) % THOUGHTS.length;
      setThought(THOUGHTS[i]);
      setThoughtKey(k => k + 1);
    }, 2800);
    return () => clearInterval(id);
  }, []);

  // Increment decisions and flash
  useEffect(() => {
    let d = 0;
    const id = setInterval(() => {
      d = (d + 1) % DECISIONS.length;
      setDecisionCount(c => c + 1);
      setFlash(DECISIONS[d]);
      setFlashKey(k => k + 1);
    }, 4200);
    return () => clearInterval(id);
  }, []);

  const allCards = [
    ...INPUTS.map((c, i) => ({ ...c, id: `in-${i}`, type: "input" })),
    ...OUTPUTS.map((c, i) => ({ ...c, id: `out-${i}`, type: "output" })),
    ...CHAOS.map((c, i) => ({ ...c, id: `chaos-${i}`, type: "chaos" })),
  ];

  return (
    <>
      <NeuralCanvas />
      <Connectors cards={allCards} centerRef={centerRef} />

      {/* CSS for stream particles injected once */}
      <style>{`
        @keyframes particle-flow-in {
          0%   { offset-distance: 0%;   opacity: 0; }
          10%  { opacity: 1; }
          90%  { opacity: 0.8; }
          100% { offset-distance: 100%; opacity: 0; }
        }
      `}</style>

      <div className="statusbar">
        <div className="status-title">AI Product Manager</div>
        <div className="status-pills">
          {PILLS.map(p => <span key={p.label} className={`pill ${p.cls}`}>{p.label}</span>)}
        </div>
      </div>

      <div className="scene">
        {/* Cards */}
        {allCards.map((card, idx) => {
          const vw = window.innerWidth / 100;
          const vh = window.innerHeight / 100;
          const style = {
            left: `calc(50% + ${card.x}vw)`,
            top: `calc(50% + ${card.y * 0.9}vh)`,
            transform: "translate(-50%, -50%)",
            animationDelay: `${idx * 0.6}s`,
          };
          return (
            <div
              key={card.id}
              id={`card-${card.id}`}
              className={`card ${card.type}`}
              style={style}
            >
              <div className="card-tag">{card.tag}</div>
              <div className="card-text">{card.text}</div>
            </div>
          );
        })}

        {/* Brain center */}
        <div className="brain" ref={centerRef}>
          <div className="brain-ring" />
          <div className="brain-ring" />
          <div className="brain-ring" />
          <div className="brain-core">
            <div className="brain-label">AI PM</div>
            <div className="counter">{decisionCount}</div>
            <div className="brain-sublabel">decisions</div>
          </div>
        </div>
      </div>

      {/* Decision flash */}
      {flash && <div key={flashKey} className="decision-flash">{flash}</div>}

      <div className="ticker">
        <span className="ticker-label">THINKING</span>
        <span key={thoughtKey} className="ticker-text">{thought}</span>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
